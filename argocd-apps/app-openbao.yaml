# ArgoCD Application – OpenBao
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://openbao.github.io/openbao-helm
    chart: openbao
    targetRevision: "*"
    helm:
      valueFiles:
        - values.yaml
      values: |
        # Override values inline here, or use valueFiles pointing to your Git repo.
        global:
          tlsDisable: true
        server:
          standalone:
            enabled: true
          service:
            type: NodePort
            nodePort: 30820
  destination:
    server: https://kubernetes.default.svc
    namespace: openbao
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
