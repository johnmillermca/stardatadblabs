apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: akhq
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
spec:
  project: platform
  sources:
    - repoURL: https://akhq.io
      chart: akhq
      targetRevision: "0.27.0"
      helm:
        valueFiles:
          - $values/k8s-platform/helm/akhq/values.yaml
    - repoURL: https://github.com/johnmillermca/stardatadblabs
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: streaming
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
