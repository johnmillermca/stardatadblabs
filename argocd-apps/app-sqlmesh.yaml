apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sqlmesh
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
spec:
  project: platform
  source:
    repoURL: https://github.com/johnmillermca/stardatadblabs
    targetRevision: HEAD
    path: k8s-platform/manifests/sqlmesh
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
