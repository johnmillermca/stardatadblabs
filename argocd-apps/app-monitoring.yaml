# =============================================================================
# ArgoCD Applications — Monitoring Stack
# Covers: monitoring namespace, prometheus, grafana, mcp-prometheus, mcp-grafana
# All synced from GitHub repo: https://github.com/johnmillermca/stardatadblabs
# =============================================================================

# ── Monitoring Namespace ──────────────────────────────────────────────────────
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-namespace
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
spec:
  project: platform
  source:
    repoURL: https://github.com/johnmillermca/stardatadblabs
    targetRevision: HEAD
    path: k8s-platform/manifests/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

# ── Prometheus (kube-prometheus-stack) ────────────────────────────────────────
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "60.4.0"
    helm:
      releaseName: prometheus
      valueFiles:
        - $values/k8s-platform/helm/prometheus/values.yaml
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "60.4.0"
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/k8s-platform/helm/prometheus/values.yaml
    - repoURL: https://github.com/johnmillermca/stardatadblabs
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

