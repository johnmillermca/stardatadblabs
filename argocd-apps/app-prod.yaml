# ArgoCD Applications — all prod namespace apps
# Each component deploys into: namespace: prod
# ArgoCD auto-syncs from: https://github.com/johnmillermca/stardatadblabs
# Secrets: read from openbao (namespace: prod), seeded by 12-seed-openbao-secrets.sh
# ─────────────────────────────────────────────────────────────────────────────

# ── Prod Namespaces manifest ──────────────────────────────────────────────────
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-namespaces
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  project: platform
  source:
    repoURL: https://github.com/johnmillermca/stardatadblabs
    targetRevision: HEAD
    path: k8s-platform/manifests/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]

# ── OpenBao (secrets engine) ──────────────────────────────────────────────────
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: platform
  source:
    repoURL: https://openbao.github.io/openbao-helm
    chart: openbao
    targetRevision: "*"
    helm:
      releaseName: openbao
      values: |
        global:
          tlsDisable: true
        server:
          standalone:
            enabled: true
          service:
            type: NodePort
            nodePort: 30820
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true, ServerSideApply=true]

