# ArgoCD Application – Private Registry
# Manages registry deployment from Git via ArgoCD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: private-registry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/stardatadblabs/k8s-platform.git
    targetRevision: main
    path: manifests/registry
  destination:
    server: https://kubernetes.default.svc
    namespace: registry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
