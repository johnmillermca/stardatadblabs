# =============================================================================
# MCP Servers — single ArgoCD Application syncing all MCP server manifests
# Covers: sqlmesh-mcp, doris-mcp, opensearch-mcp, spark-mcp, kafka-mcp
# Each is in its own subdirectory under manifests/mcp/
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-sqlmesh
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
spec:
  project: platform
  source:
    repoURL: https://github.com/johnmillermca/stardatadblabs
    targetRevision: HEAD
    path: k8s-platform/manifests/mcp/sqlmesh
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
