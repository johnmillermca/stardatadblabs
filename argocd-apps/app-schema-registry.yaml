apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: schema-registry
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform
  sources:
    - repoURL: https://confluentinc.github.io/cp-helm-charts/
      chart: cp-schema-registry
      targetRevision: "0.6.0"
      helm:
        valueFiles:
          - $values/k8s-platform/helm/schema-registry/values.yaml
    - repoURL: https://github.com/johnmillermca/stardatadblabs
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: streaming
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
