apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opensearch
  namespace: argocd
  finalizers: [resources-finalizer.argocd.io]
spec:
  project: platform
  sources:
    - repoURL: https://opensearch-project.github.io/helm-charts/
      chart: opensearch
      targetRevision: "3.7.0"
      helm:
        valueFiles:
          - $values/k8s-platform/helm/opensearch/values.yaml
    - repoURL: https://github.com/johnmillermca/stardatadblabs
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: search
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
