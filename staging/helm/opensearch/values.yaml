# =============================================================================
# OpenSearch — STAGING override values
# =============================================================================
singleNode: true
replicas: 1
imageTag: "3.7.0"
opensearchJavaOpts: "-Xms256m -Xmx256m"
extraEnvs:
  - name: DISABLE_SECURITY_PLUGIN
    value: "true"
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-credentials
        key: opensearch-password
config:
  opensearch.yml: |
    cluster.name: opensearch-staging
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: true
persistence:
  enabled: true
  size: 5Gi
  storageClass: local-path
service:
  type: NodePort
  httpPortName: http
  transportPortName: transport
  nodePort: 31920
resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"
