# =============================================================================
# Apache Spark — STAGING override values
# =============================================================================
image:
  registry: 192.168.1.50:30500
  repository: spark-gluten-velox
  tag: "3.5.1"
  pullPolicy: IfNotPresent
master:
  webPort: 8080
  clusterPort: 7077
  service:
    type: NodePort
    nodePorts:
      cluster: "31777"
      http: "31707"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: "1"
worker:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"
