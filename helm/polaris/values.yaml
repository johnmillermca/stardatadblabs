# =============================================================================
# Apache Polaris — raw manifest deployment (no official Helm chart)
# Namespace   : catalog
# Access      : http://192.168.1.50:30181 (REST catalog API, port 8181)
# Depends on  : PostgreSQL databases.postgresql:5432, db: polaris
# Image       : 192.168.1.50:30500/apache-polaris:latest
#               (must be built and pushed before deploying)
# Secret      : polaris-db-credentials (seeded by 12-seed-openbao-secrets.sh)
# =============================================================================
# This file is a reference stub. The actual deployment is in:
# manifests/polaris/polaris-deployment.yaml
# =============================================================================

image:
  repository: 192.168.1.50:30500/apache-polaris
  tag: latest

db:
  host: postgresql.prod.svc.cluster.local
  port: 5432
  name: polaris
  existingSecret: polaris-db-credentials
  userKey: db-user
  passwordKey: db-password
