# =============================================================================
# OpenSearch — single node (opensearch-project/helm-charts 3.7.0)
# Namespace   : prod
# Node        : worker3.local
# Image       : 192.168.1.50:30500/opensearch/opensearch:3.7.0 (private registry)
# Access      : http://192.168.1.53:30920 (NodePort)
#               opensearch-cluster-master.prod.svc.cluster.local:9200 (internal)
# HA          : single node
# Secret      : opensearch-credentials
# PVC         : 50Gi on /home (worker3.local)
# =============================================================================

singleNode: true
replicas: 1

image:
  repository: "192.168.1.50:30500/opensearch/opensearch"
  tag: "3.7.0"
  pullPolicy: IfNotPresent

opensearchJavaOpts: "-Xms1g -Xmx1g"

extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-credentials
        key: opensearch-password

config:
  opensearch.yml: |
    cluster.name: opensearch-prod
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: true

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path

service:
  type: NodePort
  nodePort: 30920

resources:
  requests:
    memory: 2Gi
    cpu: 500m
  limits:
    memory: 4Gi
    cpu: "2"

antiAffinity: soft
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker3.local

podDisruptionBudget:
  enable: false

startupProbe:
  failureThreshold: 30
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 60
  periodSeconds: 5
