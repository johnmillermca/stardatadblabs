# =============================================================================
# OpenSearch — 3-node HA cluster
# Namespace   : prod
# Image       : 192.168.1.50:30500/opensearch/opensearch:3.7.0 (private registry)
# Access      : http://192.168.1.5x:30920 (NodePort, any worker)
#               opensearch-cluster-master.prod.svc.cluster.local:9200 (internal)
# HA          : 3 replicas, hard pod anti-affinity across workers
# Secret      : opensearch-credentials
# =============================================================================

singleNode: false
replicas: 3

imageTag: "3.7.0"
image: "192.168.1.50:30500/opensearch/opensearch"

opensearchJavaOpts: "-Xms1g -Xmx1g"

extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: opensearch-credentials
        key: opensearch-password

config:
  opensearch.yml: |
    cluster.name: opensearch-prod
    network.host: 0.0.0.0
    discovery.zen.minimum_master_nodes: 2
    plugins.security.disabled: true

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path

service:
  type: NodePort
  nodePort: 30920

resources:
  requests:
    memory: 2Gi
    cpu: 500m
  limits:
    memory: 4Gi
    cpu: "2"

# Hard anti-affinity — each replica on a different worker, never on master
antiAffinity: hard
nodeSelector: {}
tolerations: []
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist

podDisruptionBudget:
  enable: true
  minAvailable: 2

startupProbe:
  failureThreshold: 30
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 60
  periodSeconds: 5
