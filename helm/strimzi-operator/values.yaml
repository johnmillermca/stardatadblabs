# =============================================================================
# Strimzi Kafka Operator — strimzi/strimzi-kafka-operator 1.1.0
# Namespace   : strimzi-system
# Image       : 192.168.1.50:30500/strimzi/operator:1.1.0 (private registry)
# HA          : 2 replicas for operator HA during upgrades
# =============================================================================

watchNamespaces: ["prod"]
watchAnyNamespace: false

replicas: 2

# Pull from private registry
defaultImageRegistry: 192.168.1.50:30500
defaultImageRepository: strimzi
defaultImageTag: "1.1.0"

image:
  registry: ""
  repository: ""
  name: operator
  tag: ""

logLevel: INFO
fullReconciliationIntervalMs: 120000
operationTimeoutMs: 300000
kubernetesServiceDnsDomain: cluster.local

featureGates: ""

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

# Workers only
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist

tolerations: []
createGlobalResources: true
