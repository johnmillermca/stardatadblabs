# =============================================================================
# Apache Kafka — bitnami/kafka 32.4.3 / app 4.0.0
# Namespace   : prod
# Mode        : KRaft (no ZooKeeper) — KRaft is default in Kafka 4.0
# HA          : 3 combined controller+broker replicas spread across workers
# Image       : 192.168.1.50:30500/bitnami/kafka:4.0  (private registry)
# Access      : bootstrap.prod.svc.cluster.local:9092 (internal)
#               NodePort 192.168.1.5x:30092 (external via any worker)
# Secret      : kafka-credentials
# =============================================================================

image:
  registry: 192.168.1.50:30500
  repository: bitnami/kafka
  tag: "4.0"
  pullPolicy: IfNotPresent

controller:
  replicaCount: 3
  persistence:
    enabled: true
    size: 20Gi
    storageClass: local-path
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: "2"
  # Spread across workers — never on master
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: controller
          topologyKey: kubernetes.io/hostname

broker:
  replicaCount: 0   # combined controller+broker mode

listeners:
  client:
    protocol: SASL_PLAINTEXT
    containerPort: 9092
  interbroker:
    protocol: SASL_PLAINTEXT
    containerPort: 9094
  external:
    protocol: SASL_PLAINTEXT
    containerPort: 9095

sasl:
  enabledMechanisms: PLAIN
  interBrokerMechanism: PLAIN
  client:
    users: [kafka-user]
    passwords: ""
    existingSecret: kafka-credentials
    existingSecretPasswordKey: kafka-password

externalAccess:
  enabled: true
  controller:
    service:
      type: NodePort
      nodePorts: [30092]

extraConfig: |
  auto.create.topics.enable=true
  offsets.topic.replication.factor=3
  transaction.state.log.replication.factor=3
  transaction.state.log.min.isr=2
  default.replication.factor=3
  min.insync.replicas=2

kraft:
  enabled: true
  clusterId: ""

service:
  type: ClusterIP
  ports:
    client: 9092

persistence:
  enabled: true
  size: 20Gi
  storageClass: local-path

metrics:
  kafka:
    enabled: true
  jmx:
    enabled: true

zookeeper:
  enabled: false
