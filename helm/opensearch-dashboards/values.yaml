# =============================================================================
# OpenSearch Dashboards — single replica
# Namespace   : prod
# Node        : worker3.local (co-located with OpenSearch)
# Image       : 192.168.1.50:30500/opensearch/opensearch-dashboards:3.7.0
# Access      : http://192.168.1.53:30601 (NodePort)
# =============================================================================

replicaCount: 1

image:
  repository: "192.168.1.50:30500/opensearch/opensearch-dashboards"
  tag: "3.7.0"

opensearchHosts: "http://opensearch-cluster-master.prod.svc.cluster.local:9200"

config:
  opensearch_dashboards.yml: |
    server.host: '0.0.0.0'
    opensearch.hosts: ['http://opensearch-cluster-master.prod.svc.cluster.local:9200']
    opensearch_security.disabled: true
    opensearch.ssl.verificationMode: none

extraEnvs:
  - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
    value: "true"

service:
  type: NodePort
  port: 5601
  nodePort: 30601

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker3.local

podDisruptionBudget:
  enabled: false

readinessProbe:
  failureThreshold: 10
  initialDelaySeconds: 60
  periodSeconds: 10
