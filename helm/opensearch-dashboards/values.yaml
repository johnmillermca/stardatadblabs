# =============================================================================
# OpenSearch Dashboards — 2-replica HA
# Namespace   : prod
# Image       : 192.168.1.50:30500/opensearch/opensearch-dashboards:3.7.0
# Access      : http://192.168.1.5x:30601 (NodePort, any worker)
# HA          : 2 replicas, soft anti-affinity across workers
# =============================================================================

replicaCount: 2

imageTag: "3.7.0"
image: "192.168.1.50:30500/opensearch/opensearch-dashboards"

opensearchHosts: "http://opensearch-cluster-master.prod.svc.cluster.local:9200"

config:
  opensearch_dashboards.yml: |
    server.host: '0.0.0.0'
    opensearch.hosts: ['http://opensearch-cluster-master.prod.svc.cluster.local:9200']
    opensearch_security.disabled: true
    opensearch.ssl.verificationMode: none

extraEnvs:
  - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
    value: "true"

service:
  type: NodePort
  port: 5601
  nodePort: 30601

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 1Gi
    cpu: "1"

# Spread across workers, never on master
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: opensearch-dashboards
          topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 1

readinessProbe:
  failureThreshold: 10
  initialDelaySeconds: 60
  periodSeconds: 10
