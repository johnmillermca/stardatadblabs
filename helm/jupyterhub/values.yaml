# =============================================================================
# JupyterHub — hub.jupyter.org/helm-chart 4.4.0
# Namespace   : prod
# Image       : private registry for singleuser; standard hub images cached
# Access      : http://192.168.1.5x:30888
# Secret      : jupyterhub-credentials
# =============================================================================

hub:
  config:
    JupyterHub:
      admin_access: true
      authenticator_class: dummy
    Authenticator:
      admin_users: [admin]
    DummyAuthenticator:
      password: ""
  extraEnv:
    JUPYTERHUB_CRYPT_KEY:
      valueFrom:
        secretKeyRef:
          name: jupyterhub-credentials
          key: crypt-key
          optional: true
    DUMMY_AUTH_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: jupyterhub-credentials
          key: admin-password
  extraConfig:
    00-auth: |
      import os
      c.DummyAuthenticator.password = os.environ.get('DUMMY_AUTH_PASSWORD', 'changeme')
  # Workers only — no master
  nodeSelector: {}

proxy:
  service:
    type: NodePort
    nodePorts:
      http: 30888
  chp:
    image:
      name: 192.168.1.50:30500/jupyterhub/configurable-http-proxy
      tag: "4.6.2"

singleuser:
  image:
    name: 192.168.1.50:30500/jupyter-spark
    tag: latest
    pullPolicy: IfNotPresent
  storage:
    type: dynamic
    capacity: 10Gi
    dynamic:
      storageClass: local-path
  cpu:
    limit: 2
    guarantee: 0.25
  memory:
    limit: 4G
    guarantee: 512M
  profileList:
    - display_name: "Standard — Python + PySpark"
      description: "Python 3.11, PySpark 3.5, Iceberg"
      default: true

scheduling:
  userScheduler:
    enabled: false

cull:
  enabled: true
  timeout: 3600
  every: 300
