# =============================================================================
# Apache Spark (Gluten-Velox) — bitnami/spark 10.0.3
# Namespace   : prod
# Node        : worker2.local (master + workers pinned; overflow to worker3)
# Image       : 192.168.1.50:30500/spark-gluten-velox:3.5.1 (private registry)
# Access      : http://192.168.1.52:30707 (Master UI)
#               spark://192.168.1.52:30777 (RPC)
# Workers     : 3 replicas pinned to worker2/worker3
# =============================================================================

image:
  registry: 192.168.1.50:30500
  repository: spark-gluten-velox
  tag: "3.5.1"
  pullPolicy: IfNotPresent

master:
  webPort: 8080
  clusterPort: 7077
  configOptions:
    SPARK_EXTRA_CLASSPATH: "/opt/spark/jars/gluten-velox-bundle-spark3.5_2.12-ubuntu_22.04-1.2.0.jar"
  service:
    type: NodePort
    nodePorts:
      cluster: "30777"
      http: "30707"
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: "2"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - worker2.local

worker:
  replicaCount: 3
  configOptions:
    SPARK_WORKER_MEMORY: "4G"
    SPARK_WORKER_CORES: "4"
    SPARK_EXTRA_CLASSPATH: "/opt/spark/jars/gluten-velox-bundle-spark3.5_2.12-ubuntu_22.04-1.2.0.jar"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: "4"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - worker2.local
                  - worker3.local

security:
  rpc:
    authenticationEnabled: false
  ssl:
    enabled: false

metrics:
  enabled: true
