# =============================================================================
# Apache Spark — bitnami/spark 10.0.3
# Namespace   : prod
# Image       : 192.168.1.50:30500/spark-gluten-velox:3.5.1 (private registry)
# HA          : 1 master + 3 workers spread across workers, never on master node
# Access      : http://192.168.1.5x:30707 (Master UI)
#               spark://192.168.1.5x:30777 (RPC)
# =============================================================================

image:
  registry: 192.168.1.50:30500
  repository: spark-gluten-velox
  tag: "3.5.1"
  pullPolicy: IfNotPresent

master:
  webPort: 8080
  clusterPort: 7077
  configOptions:
    SPARK_EXTRA_CLASSPATH: "/opt/spark/jars/gluten-velox-bundle-spark3.5_2.12-ubuntu_22.04-1.2.0.jar"
  service:
    type: NodePort
    nodePorts:
      cluster: "30777"
      http: "30707"
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: "2"
  # Master runs on workers only
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist

worker:
  replicaCount: 3
  configOptions:
    SPARK_WORKER_MEMORY: "4G"
    SPARK_WORKER_CORES: "4"
    SPARK_EXTRA_CLASSPATH: "/opt/spark/jars/gluten-velox-bundle-spark3.5_2.12-ubuntu_22.04-1.2.0.jar"
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: "4"
  # Spread workers across all worker nodes, hard anti-affinity
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: worker
            topologyKey: kubernetes.io/hostname

security:
  rpc:
    authenticationEnabled: false
  ssl:
    enabled: false

metrics:
  enabled: true
