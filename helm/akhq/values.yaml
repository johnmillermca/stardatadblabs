# =============================================================================
# AKHQ (Kafka HQ UI) — 2-replica HA
# Namespace   : prod
# Image       : 192.168.1.50:30500/tchiotacom/akhq:0.27.0 (private registry)
# Access      : http://192.168.1.5x:30808
# HA          : 2 replicas, PDB minAvailable=1, workers only
# =============================================================================

replicaCount: 2

image:
  registry: 192.168.1.50:30500
  repository: tchiotacom/akhq
  tag: "0.27.0"
  pullPolicy: IfNotPresent

extraEnv:
  - name: AKHQ_CONFIGURATION
    value: |
      akhq:
        connections:
          strimzi-kafka:
            properties:
              bootstrap.servers: "strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"
              security.protocol: SASL_PLAINTEXT
              sasl.mechanism: SCRAM-SHA-512
              sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"$(AKHQ_KAFKA_USER)\" password=\"$(AKHQ_KAFKA_PASS)\";"
            schema-registry:
              url: "http://schema-registry.prod.svc.cluster.local:8081"
  - name: AKHQ_KAFKA_USER
    valueFrom:
      secretKeyRef:
        name: akhq-credentials
        key: kafka-sasl-username
  - name: AKHQ_KAFKA_PASS
    valueFrom:
      secretKeyRef:
        name: akhq-credentials
        key: kafka-sasl-password

service:
  type: NodePort
  nodePort: 30808
  port: 8080

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

# Workers only, spread replicas
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: akhq
          topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 1
