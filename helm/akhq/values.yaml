# =============================================================================
# AKHQ (Kafka HQ UI) — prod namespace
# Namespace   : prod
# Access      : http://192.168.1.50:30808
# Connects to : strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
# Secret      : akhq-credentials
# =============================================================================

replicaCount: 1

image:
  tag: "0.27.0"

extraEnv:
  - name: AKHQ_CONFIGURATION
    value: |
      akhq:
        connections:
          strimzi-kafka:
            properties:
              bootstrap.servers: "strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"
              security.protocol: SASL_PLAINTEXT
              sasl.mechanism: SCRAM-SHA-512
              sasl.jaas.config: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"$(AKHQ_KAFKA_USER)\" password=\"$(AKHQ_KAFKA_PASS)\";"
            schema-registry:
              url: "http://schema-registry.prod.svc.cluster.local:8081"
  - name: AKHQ_KAFKA_USER
    valueFrom:
      secretKeyRef:
        name: akhq-credentials
        key: kafka-sasl-username
  - name: AKHQ_KAFKA_PASS
    valueFrom:
      secretKeyRef:
        name: akhq-credentials
        key: kafka-sasl-password

service:
  type: NodePort
  nodePort: 30808
  port: 8080

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

readinessProbe:
  httpGet:
    path: /api/me
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /api/me
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
