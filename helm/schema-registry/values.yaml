# =============================================================================
# Confluent Schema Registry — prod namespace
# Namespace   : prod
# Access      : http://192.168.1.50:30810
#               http://schema-registry.prod.svc.cluster.local:8081 (internal)
# Connects to : strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
# Secret      : schema-registry-credentials
# =============================================================================

replicaCount: 2

image:
  repository: confluentinc/cp-schema-registry
  tag: "7.9.0"
  pullPolicy: IfNotPresent

kafka:
  bootstrapServers: "SASL_PLAINTEXT://strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"

configurationOverrides:
  "kafkastore.bootstrap.servers": "SASL_PLAINTEXT://strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"
  "kafkastore.security.protocol": "SASL_PLAINTEXT"
  "kafkastore.sasl.mechanism": "SCRAM-SHA-512"
  "host.name": "0.0.0.0"
  "listeners": "http://0.0.0.0:8081"
  "access.control.allow.methods": "GET,POST,PUT,DELETE,OPTIONS"
  "access.control.allow.origin": "*"

extraEnvs:
  - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG
    valueFrom:
      secretKeyRef:
        name: schema-registry-credentials
        key: sasl-jaas-config

service:
  type: NodePort
  port: 8081
  nodePort: 30810

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: "1"

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 10
