# =============================================================================
# Confluent Schema Registry — 2-replica HA
# Namespace   : prod
# Image       : 192.168.1.50:30500/confluentinc/cp-schema-registry:7.9.0
# Access      : http://192.168.1.5x:30810
#               http://schema-registry.prod.svc.cluster.local:8081 (internal)
# HA          : 2 replicas, PDB minAvailable=1, spread across workers
# =============================================================================

replicaCount: 2

image:
  repository: 192.168.1.50:30500/confluentinc/cp-schema-registry
  tag: "7.9.0"
  pullPolicy: IfNotPresent

kafka:
  bootstrapServers: "SASL_PLAINTEXT://strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"

configurationOverrides:
  "kafkastore.bootstrap.servers": "SASL_PLAINTEXT://strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"
  "kafkastore.security.protocol": "SASL_PLAINTEXT"
  "kafkastore.sasl.mechanism": "SCRAM-SHA-512"
  "host.name": "0.0.0.0"
  "listeners": "http://0.0.0.0:8081"
  "access.control.allow.methods": "GET,POST,PUT,DELETE,OPTIONS"
  "access.control.allow.origin": "*"

extraEnvs:
  - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG
    valueFrom:
      secretKeyRef:
        name: schema-registry-credentials
        key: sasl-jaas-config

service:
  type: NodePort
  port: 8081
  nodePort: 30810

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: "1"

# Workers only, spread across nodes
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: cp-schema-registry
          topologyKey: kubernetes.io/hostname

podDisruptionBudget:
  enabled: true
  minAvailable: 1
