# =============================================================================
# Strimzi Operator — TESTING override values
# watchNamespaces: [prod] — operator watches only the prod namespace
# =============================================================================
watchAnyNamespace: false
watchNamespaces:
  - prod
replicas: 1
defaultImageRegistry: quay.io
defaultImageRepository: strimzi
defaultImageTag: "0.45.0"
featureGates: ""
resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 256Mi
    cpu: 250m
