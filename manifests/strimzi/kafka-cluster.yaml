# =============================================================================
# Strimzi-managed Kafka cluster — prod namespace  (single-broker, no HA)
# Namespace   : prod
# Node        : worker4.local (pinned via pod affinity on KafkaNodePool)
# Topology    : 1 combined controller+broker (KRaft) — single replica
# Listeners   :
#   PLAIN  port 9092 — SCRAM-SHA-512 in-cluster
#   EXTERNAL port 9094 → NodePort 30093 — external access
# Bootstrap   : strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
# Kafka ver   : 4.2.0 (matches installed Strimzi operator)
# PVC         : 50Gi on /home (worker4.local)
# =============================================================================

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: combined
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 250Gi
    class: local-path
    deleteClaim: false
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: "2"
  template:
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - worker4.local
    initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:1000 /var/lib/kafka/data"]
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: data
            mountPath: /var/lib/kafka/data

---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: strimzi-kafka
  namespace: prod
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: "4.2-IV1"
    image: 192.168.1.50:30500/strimzi/kafka:latest-kafka-4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      - name: external
        port: 9094
        type: nodeport
        tls: false
        authentication:
          type: scram-sha-512
        configuration:
          bootstrap:
            nodePort: 30093
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
      auto.create.topics.enable: "true"
  entityOperator:
    topicOperator: {}
    userOperator: {}

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: kafka-app-user
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  authentication:
    type: scram-sha-512

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: debezium-user
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  authentication:
    type: scram-sha-512

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: schema-registry-user
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  authentication:
    type: scram-sha-512

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: debezium-offsets
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: debezium-configs
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: debezium-statuses
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact

---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: schema-registry-schemas
  namespace: prod
  labels:
    strimzi.io/cluster: strimzi-kafka
spec:
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact
    min.compaction.lag.ms: "0"
