# =============================================================================
# Prometheus MCP Server — Kubernetes Deployment
# Namespace : monitoring
# Port      : 3200 (MCP JSON-RPC)
# NodePort  : 30320
# Image     : 192.168.1.50:30500/mcp-prometheus:1.0.0
# Connects  : Prometheus at prometheus-prometheus.monitoring.svc.cluster.local:9090
#             Alertmanager at prometheus-alertmanager.monitoring.svc.cluster.local:9093
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-prometheus
  namespace: monitoring
  labels:
    app: mcp-prometheus
    component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-prometheus
  template:
    metadata:
      labels:
        app: mcp-prometheus
        component: mcp-server
    spec:
      containers:
        - name: mcp-prometheus
          image: 192.168.1.50:30500/mcp-prometheus:1.0.0
          ports:
            - containerPort: 3200
              name: mcp
          env:
            - name: PROMETHEUS_URL
              value: "http://prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: ALERTMANAGER_URL
              value: "http://prometheus-alertmanager.monitoring.svc.cluster.local:9093"
            - name: PORT
              value: "3200"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          readinessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 30
            periodSeconds: 30
      nodeSelector:
        kubernetes.io/hostname: master.local
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-prometheus
  namespace: monitoring
  labels:
    app: mcp-prometheus
    component: mcp-server
spec:
  selector:
    app: mcp-prometheus
  type: NodePort
  ports:
    - port: 3200
      targetPort: 3200
      nodePort: 30320
      name: mcp
