# =============================================================================
# SQLMesh MCP Server — Kubernetes Deployment
# Namespace : prod
# Node      : worker2.local (co-located with SQLMesh)
# Port      : 3100 (MCP SSE transport)
# NodePort  : 30310
# Image     : 192.168.1.50:30500/mcp-sqlmesh:1.0.0
# Secret    : sqlmesh-credentials
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sqlmesh
  namespace: prod
  labels:
    app: mcp-sqlmesh
    component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-sqlmesh
  template:
    metadata:
      labels:
        app: mcp-sqlmesh
        component: mcp-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker2.local
      containers:
        - name: mcp-sqlmesh
          image: 192.168.1.50:30500/mcp-sqlmesh:1.0.0
          ports:
            - containerPort: 3100
              name: mcp
          env:
            - name: SQLMESH_CONFIG
              value: /app/config/config.yaml
            - name: SQLMESH_PROJECT_DIR
              value: /app/models
            - name: SQLMESH_DB_USER
              valueFrom:
                secretKeyRef:
                  name: sqlmesh-credentials
                  key: db-user
            - name: SQLMESH_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: sqlmesh-credentials
                  key: db-password
            - name: MCP_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-sqlmesh
  namespace: prod
spec:
  selector:
    app: mcp-sqlmesh
  type: NodePort
  ports:
    - port: 3100
      targetPort: 3100
      nodePort: 30310
      name: mcp
