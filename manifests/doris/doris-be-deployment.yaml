# =============================================================================
# Apache Doris BE (Backend) — ConfigMap + PVC + Deployment
# Namespace : prod
# Node      : worker1.local
# Connects  : to FE via ClusterIP doris-fe.prod.svc.cluster.local
# PVC       : 400Gi on /home (worker1.local)
# Replicas  : 1
# FE_SERVERS: uses doris-fe ClusterIP resolved by init container at startup
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: doris-be-config
  namespace: prod
data:
  be.conf: |
    sys_log_level = INFO
    be_port = 9060
    webserver_port = 8040
    heartbeat_service_port = 9050
    brpc_port = 8060
    storage_root_path = /opt/apache-doris/be/storage
    JAVA_OPTS = "-Xmx1024m -DlogPath=$DORIS_HOME/log/jni.log"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: doris-be-storage
  namespace: prod
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 400Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doris-be
  namespace: prod
  labels:
    app: doris-be
    component: be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doris-be
  template:
    metadata:
      labels:
        app: doris-be
        component: be
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1.local
      initContainers:
        # Resolve FE ClusterIP at startup — entrypoint requires a real IP in FE_SERVERS
        - name: resolve-fe-ip
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              FE_IP=$(nslookup doris-fe.prod.svc.cluster.local | grep 'Address:' | tail -1 | awk '{print $2}')
              echo "FE_SERVERS=fe1:${FE_IP}:9010" > /shared/fe_env
              echo "Resolved: fe1:${FE_IP}:9010"
          volumeMounts:
            - name: shared-env
              mountPath: /shared
        - name: copy-be-config
          image: busybox:1.36
          command: ["sh", "-c", "cp /config-ro/be.conf /config-rw/be.conf"]
          volumeMounts:
            - name: be-config
              mountPath: /config-ro
            - name: be-config-rw
              mountPath: /config-rw
      containers:
        - name: doris-be
          image: 192.168.1.50:30500/apache/doris:be-4.0.7
          command:
            - sh
            - -c
            - |
              . /shared/fe_env
              export FE_SERVERS
              exec /entrypoint.sh
          ports:
            - name: be-port
              containerPort: 9060
            - name: webserver
              containerPort: 8040
            - name: heartbeat
              containerPort: 9050
            - name: brpc
              containerPort: 8060
          env:
            - name: BE_ADDR
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: be-config-rw
              mountPath: /opt/apache-doris/be/conf/be.conf
              subPath: be.conf
            - name: be-storage
              mountPath: /opt/apache-doris/be/storage
            - name: shared-env
              mountPath: /shared
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8040
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: shared-env
          emptyDir: {}
        - name: be-config
          configMap:
            name: doris-be-config
        - name: be-config-rw
          emptyDir: {}
        - name: be-storage
          persistentVolumeClaim:
            claimName: doris-be-storage
