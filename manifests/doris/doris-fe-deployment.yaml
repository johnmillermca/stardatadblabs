# =============================================================================
# Apache Doris FE (Frontend) — ConfigMap + PVC + StatefulSet
# Namespace : prod
# Node      : worker1.local
# Access    : http://192.168.1.50:30030 (HTTP/WebUI) jdbc:mysql://192.168.1.50:30090
# Secret    : doris-credentials  (key: admin-password)
# PVC       : 100Gi on /home (worker1.local)
# NOTE      : StatefulSet + enable_fqdn_mode ensures BdbJE stores a stable FQDN
#             (doris-fe-0.doris-fe-headless.prod.svc.cluster.local) instead of the
#             ephemeral pod IP, so FE survives reboots without getting stuck in
#             feType:UNKNOWN.
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: doris-fe-config
  namespace: prod
data:
  fe.conf: |
    LOG_DIR = ${DORIS_HOME}/log
    sys_log_level = INFO
    meta_dir = /opt/apache-doris/fe/doris-meta
    http_port = 8030
    rpc_port = 9020
    query_port = 9030
    edit_log_port = 9010
    jdbc_drivers_dir = /opt/apache-doris/fe/jdbc_drivers
    JAVA_OPTS = "-Xmx4096m -XX:+UseMembar -XX:SurvivorRatio=8"
    JAVA_OPTS_FOR_JDK_17 = "-Xmx4096m -XX:SurvivorRatio=8 --add-opens=java.base/java.nio=ALL-UNNAMED"
    # ── Stable identity across pod restarts ──────────────────────────────────
    # BdbJE stores this FQDN instead of the ephemeral pod IP, so the membership
    # record remains valid after every reboot or pod reschedule.
    enable_fqdn_mode = true
    advertised_address = doris-fe-0.doris-fe-headless.prod.svc.cluster.local
    priority_networks = 10.244.0.0/16
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: doris-fe-meta
  namespace: prod
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: doris-fe
  namespace: prod
  labels:
    app: doris-fe
    component: fe
spec:
  replicas: 1
  serviceName: doris-fe-headless
  selector:
    matchLabels:
      app: doris-fe
  template:
    metadata:
      labels:
        app: doris-fe
        component: fe
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker1.local
      initContainers:
        - name: copy-fe-config
          image: busybox:1.36
          command: ["sh", "-c", "cp /config-ro/fe.conf /config-rw/fe.conf"]
          volumeMounts:
            - name: fe-config
              mountPath: /config-ro
            - name: fe-config-rw
              mountPath: /config-rw
      containers:
        - name: doris-fe
          image: 192.168.1.50:30500/apache/doris:fe-4.0.7
          command:
            - /opt/apache-doris/fe_entrypoint.sh
            - doris-fe-headless.prod.svc.cluster.local
          ports:
            - name: http
              containerPort: 8030
            - name: rpc
              containerPort: 9020
            - name: query
              containerPort: 9030
            - name: edit-log
              containerPort: 9010
          env:
            - name: DORIS_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: doris-credentials
                  key: admin-password
          volumeMounts:
            - name: fe-config-rw
              mountPath: /opt/apache-doris/fe/conf/fe.conf
              subPath: fe.conf
            - name: fe-meta
              mountPath: /opt/apache-doris/fe/doris-meta
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /api/bootstrap
              port: 8030
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
      volumes:
        - name: fe-config
          configMap:
              name: doris-fe-config
        - name: fe-config-rw
          emptyDir: {}
        - name: fe-meta
          persistentVolumeClaim:
            claimName: doris-fe-meta
