# =============================================================================
# Apache Spark 3.5.1 — 1 master + 3 workers — workers only
# Image  : 192.168.1.50:30500/apache/spark:3.5.1
# Access : http://192.168.1.5x:30707  (Master UI)
#          spark://192.168.1.5x:30777 (RPC)
# =============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master-svc
  namespace: prod
  labels:
    app: spark
    component: master
spec:
  type: NodePort
  selector:
    app: spark
    component: master
  ports:
    - name: rpc
      port: 7077
      targetPort: 7077
      nodePort: 30777
    - name: ui
      port: 8080
      targetPort: 8080
      nodePort: 30707
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master-headless
  namespace: prod
spec:
  clusterIP: None
  selector:
    app: spark
    component: master
  ports:
    - name: rpc
      port: 7077
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: prod
  labels:
    app: spark
    component: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      component: master
  template:
    metadata:
      labels:
        app: spark
        component: master
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: spark-master
          image: 192.168.1.50:30500/apache/spark:3.5.1
          command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
          env:
            - name: SPARK_MASTER_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 7077
            - containerPort: 8080
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: prod
  labels:
    app: spark
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spark
      component: worker
  template:
    metadata:
      labels:
        app: spark
        component: worker
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: spark
                    component: worker
                topologyKey: kubernetes.io/hostname
      containers:
        - name: spark-worker
          image: 192.168.1.50:30500/apache/spark:3.5.1
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.worker.Worker
            - spark://spark-master-svc.prod.svc.cluster.local:7077
          env:
            - name: SPARK_WORKER_MEMORY
              value: "4g"
            - name: SPARK_WORKER_CORES
              value: "4"
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "4"
