# =============================================================================
# Confluent Schema Registry 7.9.0 — single replica (no HA needed)
# Node   : worker4.local (co-located with Kafka)
# Image  : 192.168.1.50:30500/confluentinc/cp-schema-registry:7.9.0
# Access : http://192.168.1.54:30810
#          http://schema-registry.prod.svc.cluster.local:8081 (internal)
# Secret : schema-registry-user (Strimzi-managed KafkaUser secret, key: password)
#          Read directly — no intermediate secret needed. Strimzi rotates the
#          SCRAM password in this secret; reading it directly means schema-registry
#          always has the same password as Kafka's SCRAM store.
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: prod
  labels:
    app: schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker4.local
      enableServiceLinks: false
      containers:
        - name: schema-registry
          image: 192.168.1.50:30500/confluentinc/cp-schema-registry:7.9.0
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "SASL_PLAINTEXT://strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"
            - name: SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"
            - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM
              value: "SCRAM-SHA-512"
            # Read the SCRAM password directly from the Strimzi-managed KafkaUser secret.
            # Strimzi writes the canonical password here; using an intermediate secret
            # (schema-registry-credentials) causes a split — Strimzi rotates its secret
            # independently and the two diverge after every cluster reboot.
            # SCHEMA_REGISTRY_USER_PASSWORD must be declared BEFORE JAAS_CONFIG so that
            # Kubernetes env-var substitution $(SCHEMA_REGISTRY_USER_PASSWORD) resolves.
            - name: SCHEMA_REGISTRY_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: schema-registry-user
                  key: password
            - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG
              value: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"schema-registry-user\" password=\"$(SCHEMA_REGISTRY_USER_PASSWORD)\";"
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: prod
spec:
  selector:
    app: schema-registry
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30810
