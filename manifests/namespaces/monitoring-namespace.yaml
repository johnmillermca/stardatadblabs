# =============================================================================
# Monitoring namespace — Prometheus + Grafana + MCP monitoring servers
# Quota: moderate, dedicated for observability tooling only
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    environment: platform
    managed-by: platform
    purpose: observability
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    # Compute
    requests.cpu:       "8"
    limits.cpu:         "16"
    requests.memory:    16Gi
    limits.memory:      32Gi
    # Storage
    requests.storage:   200Gi
    persistentvolumeclaims: "10"
    # Objects
    pods:               "40"
    services:           "20"
    configmaps:         "40"
    secrets:            "40"
    replicationcontrollers: "10"
    resourcequotas:     "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 10m
        memory: 32Mi
    - type: Pod
      max:
        cpu: "8"
        memory: 16Gi
    - type: PersistentVolumeClaim
      max:
        storage: 100Gi
      min:
        storage: 1Gi
