# =============================================================================
# prod namespace — ALL platform workloads
#   databases (postgresql, mongodb, oracle), kerberos, openbao,
#   streaming (kafka/strimzi, schema-registry, akhq, debezium),
#   search (opensearch, opensearch-dashboards),
#   analytics (doris, spark, jupyterhub, sqlmesh),
#   security (ranger), catalog (polaris), orchestration (kestra),
#   registry, MCP servers
#
# HA sizing: 60 CPU req / 120 CPU lim  |  120 Gi mem req / 240 Gi lim
#            2 Ti storage  |  300 pods  |  60 PVCs
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    environment: prod
    app.kubernetes.io/managed-by: platform
    purpose: all-workloads
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: prod
spec:
  hard:
    requests.cpu:            "60"
    limits.cpu:              "120"
    requests.memory:         120Gi
    limits.memory:           240Gi
    requests.storage:        2000Gi
    persistentvolumeclaims:  "60"
    pods:                    "300"
    services:                "150"
    configmaps:              "300"
    secrets:                 "300"
    replicationcontrollers:  "60"
    resourcequotas:          "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limits
  namespace: prod
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "16"
        memory: 32Gi
      min:
        cpu: 10m
        memory: 32Mi
    - type: Pod
      max:
        cpu: "32"
        memory: 64Gi
    - type: PersistentVolumeClaim
      max:
        storage: 500Gi
      min:
        storage: 1Gi
