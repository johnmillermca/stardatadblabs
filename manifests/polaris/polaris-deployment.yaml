# =============================================================================
# Apache Polaris — ConfigMap + Deployment + Service
# Namespace : prod
# Node      : master.local (pinned — freeing worker capacity)
# Access    : http://192.168.1.50:30181 (Iceberg REST catalog API)
# Depends on: PostgreSQL databases.postgresql:5432, db: polaris
# Image     : 192.168.1.50:30500/apache-polaris:1.6.0
# Secret    : polaris-db-credentials (seeded by 12-seed-openbao-secrets.sh)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: polaris-config
  namespace: prod
data:
  application.properties: |
    server.port=8181
    polaris.persistence.type=relational-jdbc
    polaris.persistence.relational.jdbc.type=postgres
    polaris.persistence.relational.jdbc.host=postgresql.prod.svc.cluster.local
    polaris.persistence.relational.jdbc.port=5432
    polaris.persistence.relational.jdbc.database=polaris
    polaris.persistence.relational.jdbc.user=${POLARIS_DB_USER}
    polaris.persistence.relational.jdbc.password=${POLARIS_DB_PASS}
    polaris.features.ALLOW_WILDCARD_LOCATION=true
    polaris.features.INITIALIZE_DEFAULT_CATALOG_FILEIO_FOR_WRITES=true
    logging.level.org.apache.polaris=INFO
    management.endpoints.web.exposure.include=health,info,metrics
    management.endpoint.health.show-details=always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris
  namespace: prod
  labels:
    app: polaris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polaris
  template:
    metadata:
      labels:
        app: polaris
    spec:
      nodeSelector:
        kubernetes.io/hostname: master.local
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: polaris
          image: 192.168.1.50:30500/apache-polaris:1.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: rest
              containerPort: 8181
          env:
            - name: POLARIS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: polaris-db-credentials
                  key: db-user
            - name: POLARIS_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: polaris-db-credentials
                  key: db-password
          volumeMounts:
            - name: polaris-config
              # entrypoint.sh reads /opt/polaris/application.properties directly;
              # mount the ConfigMap here rather than into the empty config/ subdir.
              mountPath: /opt/polaris/application.properties
              subPath: application.properties
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            tcpSocket:
              port: 8181
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8181
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: polaris-config
          configMap:
            name: polaris-config
---
apiVersion: v1
kind: Service
metadata:
  name: polaris-rest
  namespace: prod
spec:
  selector:
    app: polaris
  type: NodePort
  ports:
    - name: rest
      port: 8181
      targetPort: 8181
      nodePort: 30181
