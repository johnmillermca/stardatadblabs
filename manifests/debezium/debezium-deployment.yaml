# =============================================================================
# Debezium Kafka Connect — ConfigMap + Deployment + Service
# Namespace : prod
# Node      : worker4.local (co-located with Kafka)
# Access    : http://192.168.1.54:30083 (REST API)
# Connects to: Kafka at strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
# CDC sources: PostgreSQL (pgoutput), MongoDB, Oracle (LogMiner)
# Secret    : debezium-credentials  (kafka-sasl-username, kafka-sasl-password)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connect-config
  namespace: prod
data:
  connect-distributed.properties: |
    bootstrap.servers=strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
    group.id=debezium-connect-cluster

    # Kafka SASL/PLAIN — credentials injected from env vars at runtime
    security.protocol=SASL_PLAINTEXT
    sasl.mechanism=PLAIN
    sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
      username="${KAFKA_SASL_USERNAME}" \
      password="${KAFKA_SASL_PASSWORD}";

    # Same SASL config for producer and consumer
    producer.security.protocol=SASL_PLAINTEXT
    producer.sasl.mechanism=PLAIN
    producer.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
      username="${KAFKA_SASL_USERNAME}" \
      password="${KAFKA_SASL_PASSWORD}";
    consumer.security.protocol=SASL_PLAINTEXT
    consumer.sasl.mechanism=PLAIN
    consumer.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
      username="${KAFKA_SASL_USERNAME}" \
      password="${KAFKA_SASL_PASSWORD}";

    # Internal Kafka Connect storage topics (single broker = replication.factor 1)
    config.storage.topic=debezium-configs
    config.storage.replication.factor=1
    offset.storage.topic=debezium-offsets
    offset.storage.replication.factor=1
    status.storage.topic=debezium-statuses
    status.storage.replication.factor=1

    # REST API
    rest.host.name=0.0.0.0
    rest.port=8083

    # Converters
    key.converter=org.apache.kafka.connect.json.JsonConverter
    value.converter=org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable=false
    value.converter.schemas.enable=false

    # Plugin path — Debezium connector JARs are bundled in the image
    plugin.path=/kafka/connect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: prod
  labels:
    app: debezium-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium-connect
  template:
    metadata:
      labels:
        app: debezium-connect
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker4.local
      initContainers:
        - name: copy-config
          image: 192.168.1.50:30500/strimzi/kafka:latest-kafka-4.2.0
          command: ["sh", "-c", "cp /kafka-config-ro/connect-distributed.properties /kafka-config-rw/connect-distributed.properties"]
          volumeMounts:
            - name: connect-config-ro
              mountPath: /kafka-config-ro
              readOnly: true
            - name: connect-config-rw
              mountPath: /kafka-config-rw
      containers:
        - name: debezium-connect
          image: 192.168.1.50:30500/strimzi/kafka:latest-kafka-4.2.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              sed -i "s|\${KAFKA_SASL_USERNAME}|${KAFKA_SASL_USERNAME}|g; s|\${KAFKA_SASL_PASSWORD}|${KAFKA_SASL_PASSWORD}|g" /kafka-config-rw/connect-distributed.properties
              exec /opt/kafka/bin/connect-distributed.sh /kafka-config-rw/connect-distributed.properties
          ports:
            - name: rest-api
              containerPort: 8083
          env:
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: kafka-sasl-username
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: kafka-sasl-password
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: pg-password
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: mongo-password
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: oracle-password
          volumeMounts:
            - name: connect-config-rw
              mountPath: /kafka-config-rw
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: connect-config-ro
          configMap:
            name: debezium-connect-config
        - name: connect-config-rw
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: prod
spec:
  selector:
    app: debezium-connect
  type: NodePort
  ports:
    - name: rest-api
      port: 8083
      targetPort: 8083
      nodePort: 30083
