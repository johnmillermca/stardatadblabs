# =============================================================================
# Debezium Kafka Connect — ConfigMap + Deployment + Service
# Namespace : prod
# Node      : worker4.local (co-located with Kafka)
# Access    : http://192.168.1.54:30083 (REST API)
# Connects to: Kafka at strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
# CDC sources: PostgreSQL (pgoutput), MongoDB, Oracle (LogMiner)
# Secret    : debezium-credentials  (kafka-sasl-username, kafka-sasl-password)
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connect-config
  namespace: prod
data:
  connect-distributed.properties: |
    bootstrap.servers=strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092
    group.id=debezium-connect-cluster

    security.protocol=SASL_PLAINTEXT
    sasl.mechanism=SCRAM-SHA-512
    sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";

    producer.security.protocol=SASL_PLAINTEXT
    producer.sasl.mechanism=SCRAM-SHA-512
    producer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";

    consumer.security.protocol=SASL_PLAINTEXT
    consumer.sasl.mechanism=SCRAM-SHA-512
    consumer.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";

    # Internal Kafka Connect storage topics (single broker = replication.factor 1)
    config.storage.topic=debezium-configs
    config.storage.replication.factor=1
    offset.storage.topic=debezium-offsets
    offset.storage.replication.factor=1
    status.storage.topic=debezium-statuses
    status.storage.replication.factor=1

    # REST API
    rest.host.name=0.0.0.0
    rest.port=8083

    # Converters
    key.converter=org.apache.kafka.connect.json.JsonConverter
    value.converter=org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable=false
    value.converter.schemas.enable=false

    # Plugin path — Debezium connector JARs are bundled in the image
    plugin.path=/kafka/connect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: prod
  labels:
    app: debezium-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium-connect
  template:
    metadata:
      labels:
        app: debezium-connect
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker2.local
      containers:
        - name: debezium-connect
          image: 192.168.1.50:30500/debezium/connect:2.7
          imagePullPolicy: IfNotPresent
          ports:
            - name: rest-api
              containerPort: 8083
          env:
            # Bootstrap — Debezium entrypoint reads this directly
            - name: BOOTSTRAP_SERVERS
              value: "strimzi-kafka-kafka-bootstrap.prod.svc.cluster.local:9092"
            - name: GROUP_ID
              value: "debezium-connect-cluster"
            # SASL/SCRAM-SHA-512
            - name: CONNECT_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"
            - name: CONNECT_SASL_MECHANISM
              value: "SCRAM-SHA-512"
            - name: CONNECT_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: kafka-sasl-jaas-config
            - name: CONNECT_PRODUCER_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"
            - name: CONNECT_PRODUCER_SASL_MECHANISM
              value: "SCRAM-SHA-512"
            - name: CONNECT_PRODUCER_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: kafka-sasl-jaas-config
            - name: CONNECT_CONSUMER_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"
            - name: CONNECT_CONSUMER_SASL_MECHANISM
              value: "SCRAM-SHA-512"
            - name: CONNECT_CONSUMER_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: kafka-sasl-jaas-config
            # Internal topics
            - name: CONFIG_STORAGE_TOPIC
              value: "debezium-configs"
            - name: OFFSET_STORAGE_TOPIC
              value: "debezium-offsets"
            - name: STATUS_STORAGE_TOPIC
              value: "debezium-statuses"
            # Converters
            - name: KEY_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: VALUE_CONVERTER
              value: "org.apache.kafka.connect.json.JsonConverter"
            - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            # DB credentials for connectors
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: pg-password
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: mongo-password
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-credentials
                  key: oracle-password
          volumeMounts:
            - name: debezium-data
              mountPath: /kafka/data
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 20
      volumes:
        - name: debezium-data
          persistentVolumeClaim:
            claimName: debezium-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: debezium-data
  namespace: prod
  labels:
    app: debezium-connect
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: local-path
---
apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: prod
spec:
  selector:
    app: debezium-connect
  type: NodePort
  ports:
    - name: rest-api
      port: 8083
      targetPort: 8083
      nodePort: 30083
